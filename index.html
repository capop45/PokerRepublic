<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Poker de La República - Sistema de gerenciamento de jogos de poker, home games e torneios com ranking e controle financeiro.">
    <meta name="theme-color" content="#0a1628">
    <title>Poker de La República</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS & THEME SYSTEM
   ═══════════════════════════════════════════════════════════════ */
:root {
    /* Typography */
    --font-primary: 'Outfit', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --fs-xs: clamp(0.75rem, 2vw, 0.85rem);
    --fs-sm: clamp(0.875rem, 2.5vw, 1rem);
    --fs-md: clamp(1rem, 3vw, 1.15rem);
    --fs-lg: clamp(1.15rem, 3.5vw, 1.35rem);
    --fs-xl: clamp(1.35rem, 4vw, 1.65rem);
    --fs-2xl: clamp(1.65rem, 5vw, 2.25rem);
    --fs-3xl: clamp(2rem, 6vw, 3rem);
    /* Spacing */
    --sp-xs: 0.25rem;
    --sp-sm: 0.5rem;
    --sp-md: 1rem;
    --sp-lg: 1.5rem;
    --sp-xl: 2rem;
    --sp-2xl: 3rem;
    /* Borders & Radius */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --radius-full: 9999px;
    /* Transitions */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --transition-fast: 150ms var(--ease-out);
    --transition-normal: 250ms var(--ease-out);
    --transition-slow: 400ms var(--ease-out);
    /* Shadows */
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.15);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.2);
    --shadow-xl: 0 20px 60px rgba(0,0,0,0.3);
    /* Chip colors */
    --chip-100: #e8e8e8;
    --chip-500: #e74c3c;
    --chip-1k: #3498db;
    --chip-5k: #f39c12;
}

/* Dark Theme */
[data-theme="dark"] {
    --bg-primary: #0a1628;
    --bg-secondary: #111d33;
    --bg-tertiary: #172340;
    --bg-card: #14223a;
    --bg-card-hover: #1a2d4d;
    --bg-input: #0d1a2f;
    --bg-modal: #111d33ee;
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.1);
    --border-strong: rgba(255,255,255,0.18);
    --text-primary: #f0f4f8;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --text-inverse: #0a1628;
    --accent-primary: #d4a853;
    --accent-primary-hover: #e6bc6a;
    --accent-secondary: #22c55e;
    --accent-danger: #ef4444;
    --accent-info: #3b82f6;
    --accent-warning: #f59e0b;
    --accent-gradient: linear-gradient(135deg, #d4a853 0%, #f0d68a 50%, #d4a853 100%);
    --glass-bg: rgba(20, 34, 58, 0.7);
    --glass-border: rgba(212, 168, 83, 0.15);
    --glow-accent: 0 0 20px rgba(212, 168, 83, 0.15);
    --scrollbar-track: #0a1628;
    --scrollbar-thumb: #2a3a55;
    color-scheme: dark;
}

/* Light Theme */
[data-theme="light"] {
    --bg-primary: #f5f0e8;
    --bg-secondary: #ede6da;
    --bg-tertiary: #e5ddd0;
    --bg-card: #ffffff;
    --bg-card-hover: #faf7f2;
    --bg-input: #faf7f2;
    --bg-modal: #ffffffee;
    --border-subtle: rgba(0,0,0,0.05);
    --border-default: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text-primary: #1a1510;
    --text-secondary: #5c5346;
    --text-muted: #8c8172;
    --text-inverse: #f0f4f8;
    --accent-primary: #a67c2e;
    --accent-primary-hover: #c49533;
    --accent-secondary: #16a34a;
    --accent-danger: #dc2626;
    --accent-info: #2563eb;
    --accent-warning: #d97706;
    --accent-gradient: linear-gradient(135deg, #a67c2e 0%, #d4a853 50%, #a67c2e 100%);
    --glass-bg: rgba(255, 255, 255, 0.75);
    --glass-border: rgba(166, 124, 46, 0.2);
    --glow-accent: 0 0 20px rgba(166, 124, 46, 0.1);
    --scrollbar-track: #f5f0e8;
    --scrollbar-thumb: #c9bfaf;
    color-scheme: light;
}

/* ═══════════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
    font-family: var(--font-primary);
    font-size: var(--fs-md);
    line-height: 1.6;
    color: var(--text-primary);
    background: var(--bg-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background var(--transition-normal), color var(--transition-normal);
    -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: var(--radius-full); }

/* Focus */
:focus-visible {
    outline: 2px solid var(--accent-primary);
    outline-offset: 2px;
    border-radius: var(--radius-sm);
}

/* ═══════════════════════════════════════════════════════════════
   ANIMATED BACKGROUND
   ═══════════════════════════════════════════════════════════════ */
.bg-pattern {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image:
        radial-gradient(circle at 20% 30%, var(--accent-primary) 1px, transparent 1px),
        radial-gradient(circle at 80% 70%, var(--accent-primary) 1px, transparent 1px);
    background-size: 60px 60px;
}

/* ═══════════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════════ */
.app-header {
    position: sticky; top: 0; z-index: 100;
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border-bottom: 1px solid var(--glass-border);
    padding: var(--sp-sm) var(--sp-md);
    transition: background var(--transition-normal);
}
.header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: var(--sp-md);
}
.logo-group { display: flex; align-items: center; gap: var(--sp-sm); }
.logo-icon {
    width: 40px; height: 40px;
    background: var(--accent-gradient);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; box-shadow: var(--glow-accent);
}
.logo-text {
    font-size: var(--fs-lg); font-weight: 700;
    background: var(--accent-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
}
.header-actions { display: flex; align-items: center; gap: var(--sp-sm); }

/* Theme Toggle */
.theme-toggle {
    position: relative; width: 56px; height: 30px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-full);
    cursor: pointer; transition: all var(--transition-normal);
    display: flex; align-items: center; padding: 0 4px;
}
.theme-toggle::before {
    content: '☀️'; position: absolute; left: 6px; font-size: 0.85rem;
    transition: opacity var(--transition-normal);
}
.theme-toggle::after {
    content: '🌙'; position: absolute; right: 6px; font-size: 0.85rem;
    transition: opacity var(--transition-normal);
}
.theme-toggle .knob {
    width: 22px; height: 22px;
    background: var(--accent-primary);
    border-radius: 50%;
    transition: transform var(--transition-normal);
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    z-index: 1;
}
[data-theme="light"] .theme-toggle .knob { transform: translateX(0); }
[data-theme="dark"] .theme-toggle .knob { transform: translateX(26px); }

/* Sync indicator */
.sync-indicator {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent-secondary);
    box-shadow: 0 0 8px var(--accent-secondary);
    transition: all var(--transition-normal);
}
.sync-indicator.syncing {
    background: var(--accent-warning);
    box-shadow: 0 0 8px var(--accent-warning);
    animation: pulse 1s infinite;
}
.sync-indicator.error {
    background: var(--accent-danger);
    box-shadow: 0 0 8px var(--accent-danger);
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
.nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border-top: 1px solid var(--glass-border);
    padding: var(--sp-xs) var(--sp-sm);
    padding-bottom: max(var(--sp-xs), env(safe-area-inset-bottom));
    transition: background var(--transition-normal);
}
.nav-inner {
    max-width: 600px; margin: 0 auto;
    display: flex; justify-content: space-around; gap: var(--sp-xs);
}
.nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; color: var(--text-muted);
    font-family: var(--font-primary);
    font-size: var(--fs-xs); font-weight: 500;
    cursor: pointer; padding: var(--sp-xs) var(--sp-sm);
    border-radius: var(--radius-md);
    transition: all var(--transition-fast);
    min-width: 60px;
    -webkit-tap-highlight-color: transparent;
}
.nav-btn .nav-icon { font-size: 1.5rem; line-height: 1; }
.nav-btn.active { color: var(--accent-primary); }
.nav-btn.active .nav-icon { transform: scale(1.1); }
.nav-btn:hover { color: var(--accent-primary); background: var(--border-subtle); }

/* ═══════════════════════════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════════════════════════ */
.app-main {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: var(--sp-md) var(--sp-md) calc(80px + var(--sp-xl));
    min-height: calc(100vh - 60px);
}

/* Sections */
.section { display: none; animation: fadeIn 0.3s var(--ease-out); }
.section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--sp-lg); flex-wrap: wrap; gap: var(--sp-sm);
}
.section-title {
    font-size: var(--fs-2xl); font-weight: 800;
    letter-spacing: -0.03em;
    background: var(--accent-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* ═══════════════════════════════════════════════════════════════
   CARDS
   ═══════════════════════════════════════════════════════════════ */
.card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: var(--sp-lg);
    transition: all var(--transition-normal);
    box-shadow: var(--shadow-sm);
}
.card:hover { border-color: var(--border-default); box-shadow: var(--shadow-md); }

.card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
    gap: var(--sp-md);
}

/* Stats cards */
.stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: var(--sp-sm); margin-bottom: var(--sp-lg);
}
.stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: var(--sp-md);
    text-align: center;
    transition: all var(--transition-normal);
}
.stat-card:hover { border-color: var(--glass-border); box-shadow: var(--glow-accent); }
.stat-value {
    font-size: var(--fs-2xl); font-weight: 800;
    color: var(--accent-primary);
    font-family: var(--font-mono);
}
.stat-label { font-size: var(--fs-xs); color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

/* ═══════════════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════════════ */
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: var(--sp-sm);
    font-family: var(--font-primary);
    font-size: var(--fs-sm); font-weight: 600;
    padding: var(--sp-sm) var(--sp-lg);
    border: none; border-radius: var(--radius-md);
    cursor: pointer;
    transition: all var(--transition-fast);
    white-space: nowrap;
    min-height: 44px; /* Accessibility */
    -webkit-tap-highlight-color: transparent;
}
.btn-primary {
    background: var(--accent-gradient);
    color: #1a1510;
    box-shadow: var(--glow-accent);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-md), var(--glow-accent); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border-default);
}
.btn-secondary:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
.btn-danger { background: var(--accent-danger); color: white; }
.btn-danger:hover { background: #dc2626; transform: translateY(-1px); }
.btn-success { background: var(--accent-secondary); color: white; }
.btn-success:hover { transform: translateY(-1px); }
.btn-sm { padding: var(--sp-xs) var(--sp-md); font-size: var(--fs-xs); min-height: 36px; }
.btn-icon {
    width: 44px; height: 44px; padding: 0;
    border-radius: var(--radius-md);
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
}
.btn-icon:hover { color: var(--accent-primary); border-color: var(--accent-primary); }
.btn-block { width: 100%; }

/* FAB (Floating Action Button) */
.fab {
    position: fixed; bottom: 90px; right: var(--sp-md); z-index: 90;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent-gradient);
    color: #1a1510; border: none;
    font-size: 1.5rem; cursor: pointer;
    box-shadow: var(--shadow-lg), var(--glow-accent);
    transition: all var(--transition-normal);
    display: flex; align-items: center; justify-content: center;
}
.fab:hover { transform: scale(1.1) translateY(-2px); box-shadow: var(--shadow-xl), var(--glow-accent); }
.fab:active { transform: scale(0.95); }

/* ═══════════════════════════════════════════════════════════════
   FORMS
   ═══════════════════════════════════════════════════════════════ */
.form-group { margin-bottom: var(--sp-md); }
.form-label {
    display: block; font-size: var(--fs-sm); font-weight: 600;
    color: var(--text-secondary); margin-bottom: var(--sp-xs);
}
.form-input, .form-select {
    width: 100%;
    padding: var(--sp-sm) var(--sp-md);
    font-family: var(--font-primary);
    font-size: var(--fs-md);
    color: var(--text-primary);
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    transition: all var(--transition-fast);
    min-height: 48px; /* Large touch targets */
}
.form-input:focus, .form-select:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.15);
    outline: none;
}
.form-input::placeholder { color: var(--text-muted); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-sm); }

/* Chip input counter */
.chip-input-group {
    display: flex; align-items: center; gap: var(--sp-sm);
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: var(--sp-xs) var(--sp-sm);
}
.chip-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: var(--radius-full);
    font-size: var(--fs-xs); font-weight: 700;
    font-family: var(--font-mono);
    min-width: 55px; justify-content: center;
}
.chip-badge.c100 { background: var(--chip-100); color: #333; }
.chip-badge.c500 { background: var(--chip-500); color: white; }
.chip-badge.c1k { background: var(--chip-1k); color: white; }
.chip-badge.c5k { background: var(--chip-5k); color: white; }
.chip-input-group input {
    width: 70px; text-align: center;
    background: transparent; border: none;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: var(--fs-md); font-weight: 600;
}
.chip-input-group input:focus { outline: none; }
.chip-input-group .chip-stepper {
    display: flex; flex-direction: column; gap: 2px;
}
.chip-stepper button {
    width: 28px; height: 20px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    color: var(--text-secondary);
    cursor: pointer; font-size: 0.7rem;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition-fast);
}
.chip-stepper button:hover { background: var(--accent-primary); color: var(--text-inverse); }

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
.modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    display: none; align-items: flex-end; justify-content: center;
    padding: 0;
    animation: modalBgIn 0.2s ease;
}
.modal-overlay.active { display: flex; }
@keyframes modalBgIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    padding: var(--sp-lg);
    animation: modalSlideUp 0.3s var(--ease-out);
}
@keyframes modalSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

@media (min-width: 640px) {
    .modal-overlay { align-items: center; padding: var(--sp-xl); }
    .modal {
        border-radius: var(--radius-xl);
        max-height: 85vh;
    }
}

.modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--sp-lg);
    padding-bottom: var(--sp-md);
    border-bottom: 1px solid var(--border-subtle);
}
.modal-title { font-size: var(--fs-xl); font-weight: 700; }
.modal-close {
    width: 40px; height: 40px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    color: var(--text-muted);
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition-fast);
}
.modal-close:hover { color: var(--accent-danger); border-color: var(--accent-danger); }

/* ═══════════════════════════════════════════════════════════════
   TABLES (for ranking etc.)
   ═══════════════════════════════════════════════════════════════ */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td {
    padding: var(--sp-sm) var(--sp-md);
    text-align: left;
    border-bottom: 1px solid var(--border-subtle);
    font-size: var(--fs-sm);
}
.data-table th {
    font-size: var(--fs-xs); font-weight: 600;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.05em;
    position: sticky; top: 0;
    background: var(--bg-card);
}
.data-table tr:hover td { background: var(--bg-card-hover); }
.data-table .rank-cell { font-weight: 700; color: var(--accent-primary); font-family: var(--font-mono); }

/* Rank badges */
.rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    font-size: var(--fs-xs); font-weight: 800;
    font-family: var(--font-mono);
}
.rank-badge.gold { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #4a3000; }
.rank-badge.silver { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #333; }
.rank-badge.bronze { background: linear-gradient(135deg, #cd7f32, #a0602a); color: #fff; }

/* ═══════════════════════════════════════════════════════════════
   PLAYER ITEM
   ═══════════════════════════════════════════════════════════════ */
.player-item {
    display: flex; align-items: center; gap: var(--sp-md);
    padding: var(--sp-md);
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    transition: all var(--transition-normal);
    cursor: pointer;
}
.player-item:hover { border-color: var(--glass-border); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.player-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--accent-gradient);
    display: flex; align-items: center; justify-content: center;

    color: #1a1510;
    flex-shrink: 0;
}
.player-info { flex: 1; min-width: 0; }
.player-name { font-size: var(--fs-md); font-weight: 600; }
.player-stats-inline {
    display: flex; gap: var(--sp-md); flex-wrap: wrap;

}
.player-balance {

}

/* ═══════════════════════════════════════════════════════════════
   GAME CARD
   ═══════════════════════════════════════════════════════════════ */

}
.game-card:hover { border-color: var(--glass-border); box-shadow: var(--shadow-md); }
.game-card-header {

    border-bottom: 1px solid var(--border-subtle);
}
.game-type-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: var(--radius-full);
    font-size: var(--fs-xs); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
}
.game-type-badge.home { background: rgba(34,197,94,0.15); color: var(--accent-secondary); }
.game-type-badge.tournament { background: rgba(59,130,246,0.15); color: var(--accent-info); }
.game-type-badge.active { background: rgba(245,158,11,0.15); color: var(--accent-warning); }
.game-type-badge.finished { background: rgba(100,116,139,0.15); color: var(--text-muted); }
.game-card-body { padding: var(--sp-md) var(--sp-lg); }
.game-card-footer {
    padding: var(--sp-sm) var(--sp-lg);
    display: flex; gap: var(--sp-sm); flex-wrap: wrap;
    border-top: 1px solid var(--border-subtle);
    background: var(--bg-tertiary);
}

/* ═══════════════════════════════════════════════════════════════
   CHIP DISPLAY
   ═══════════════════════════════════════════════════════════════ */
.chip-display {
    display: flex; align-items: center; gap: var(--sp-xs);
    flex-wrap: wrap;
}
.chip {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 2px 8px; border-radius: var(--radius-full);
    font-size: var(--fs-xs); font-weight: 700;
    font-family: var(--font-mono);
}
.chip.c100 { background: var(--chip-100); color: #333; }
.chip.c500 { background: var(--chip-500); color: white; }
.chip.c1k { background: var(--chip-1k); color: white; }
.chip.c5k { background: var(--chip-5k); color: white; }

/* ═══════════════════════════════════════════════════════════════
   TRANSACTION LIST
   ═══════════════════════════════════════════════════════════════ */
.tx-item {
    display: flex; align-items: center; gap: var(--sp-md);
    padding: var(--sp-md);
    border-bottom: 1px solid var(--border-subtle);
}
.tx-icon {
    width: 40px; height: 40px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
}
.tx-icon.deposit { background: rgba(34,197,94,0.12); }
.tx-icon.withdraw { background: rgba(239,68,68,0.12); }
.tx-icon.game { background: rgba(59,130,246,0.12); }
.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: var(--fs-sm); font-weight: 500; }
.tx-date { font-size: var(--fs-xs); color: var(--text-muted); }
.tx-amount { font-family: var(--font-mono); font-weight: 700; font-size: var(--fs-md); white-space: nowrap; }

/* ═══════════════════════════════════════════════════════════════
   PRIZE STRUCTURE
   ═══════════════════════════════════════════════════════════════ */
.prize-bar {
    display: flex; align-items: center; gap: var(--sp-sm);
    padding: var(--sp-xs) 0;
}
.prize-position { font-weight: 700; font-size: var(--fs-sm); width: 24px; text-align: center; color: var(--accent-primary); }
.prize-fill {
    flex: 1; height: 28px; border-radius: var(--radius-sm);
    background: var(--bg-tertiary);
    position: relative; overflow: hidden;
}
.prize-fill-inner {
    height: 100%; border-radius: var(--radius-sm);
    background: var(--accent-gradient);
    transition: width 0.5s var(--ease-out);
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: var(--sp-sm);
    font-size: var(--fs-xs); font-weight: 700; color: #1a1510;
}

/* ═══════════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
   ═══════════════════════════════════════════════════════════════ */
.toast-container { position: fixed; top: 70px; right: var(--sp-md); z-index: 300; display: flex; flex-direction: column; gap: var(--sp-sm); }
.toast {
    padding: var(--sp-md) var(--sp-lg);
    border-radius: var(--radius-md);
    font-size: var(--fs-sm); font-weight: 500;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.3s var(--ease-out), toastOut 0.3s var(--ease-out) 2.7s forwards;
    max-width: 340px;
}
.toast.success { background: var(--accent-secondary); color: white; }
.toast.error { background: var(--accent-danger); color: white; }
.toast.info { background: var(--accent-info); color: white; }
@keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(100%); } }

/* ═══════════════════════════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════════════════════════ */
.empty-state {

}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: var(--sp-md); opacity: 0.5; }

/* ═══════════════════════════════════════════════════════════════
   LOADING SKELETON
   ═══════════════════════════════════════════════════════════════ */
.skeleton {
    background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-card-hover) 50%, var(--bg-tertiary) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius-md);

@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG & STATE
   ═══════════════════════════════════════════════════════════════ */
const CONFIG = {
    BIN_ID: '6a567df1da38895dfe5d3a2b',
    API_KEY: '$2a$10$VrLvGRArbSVlRMrDfm13e.KEGQkgc1CyHJpBNQex9rPUq8Z0JiTea',
    BASE_URL: 'https://api.jsonbin.io/v3/b',
    CHIP_VALUES: { 100: 0.10, 500: 0.50, 1000: 1.00, 5000: 5.00 },
    CHIP_LABELS: { 100: '$100', 500: '$500', 1000: '$1k', 5000: '$5k' },
    CHIP_CLASSES: { 100: 'c100', 500: 'c500', 1000: 'c1k', 5000: 'c5k' },
    DEFAULT_PRIZE: [
        { position: 1, pct: 50 },
        { position: 2, pct: 30 },
        { position: 3, pct: 20 }
    ]
};

let DB = { players: [], homeGames: [], tournaments: [], transactions: [], settings: {} };
let currentSection = 'dashboard';
let gameFilter = 'all';
let rankingTab = 'general';
let syncTimeout = null;
let currentDetailPlayerId = null;
let currentDetailGame = null;

/* ═══════════════════════════════════════════════════════════════
   THEME
   ═══════════════════════════════════════════════════════════════ */
function initTheme() {
    const saved = localStorage.getItem('poker-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
}
function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('poker-theme', next);
}
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
initTheme();

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
function navigate(section, skipRender) {
    currentSection = section;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + section).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.section === section));
    if (!skipRender) renderCurrentSection();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.section));
});

/* ═══════════════════════════════════════════════════════════════
   JSONBIN SYNC
   ═══════════════════════════════════════════════════════════════ */
function setSyncStatus(status) {
    const el = document.getElementById('syncIndicator');
    el.className = 'sync-indicator' + (status === 'ok' ? '' : status === 'syncing' ? ' syncing' : ' error');
    el.title = status === 'ok' ? 'Sincronizado' : status === 'syncing' ? 'Sincronizando...' : 'Erro na sincronização';
}

async function loadData() {
    setSyncStatus('syncing');
    try {
        const res = await fetch(`${CONFIG.BASE_URL}/${CONFIG.BIN_ID}/latest`, {
            headers: { 'X-Access-Key': CONFIG.API_KEY }
        });
        if (!res.ok) throw new Error('Falha ao carregar');
        const json = await res.json();
        DB = json.record;
        // Ensure arrays exist
        DB.players = DB.players || [];
        DB.homeGames = DB.homeGames || [];
        DB.tournaments = DB.tournaments || [];
        DB.transactions = DB.transactions || [];
        DB.settings = DB.settings || {};
        setSyncStatus('ok');
        renderCurrentSection();
    } catch (e) {
        console.error('Load error:', e);
        setSyncStatus('error');
        toast('Erro ao carregar dados', 'error');
    }
}

async function saveData() {
    setSyncStatus('syncing');
    try {
        const res = await fetch(`${CONFIG.BASE_URL}/${CONFIG.BIN_ID}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Access-Key': CONFIG.API_KEY
            },
            body: JSON.stringify(DB)
        });
        if (!res.ok) throw new Error('Falha ao salvar');
        setSyncStatus('ok');
    } catch (e) {
        console.error('Save error:', e);
        setSyncStatus('error');
        toast('Erro ao sincronizar', 'error');
    }
}

function debouncedSave() {
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(saveData, 600);
}

/* ═══════════════════════════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════════════════════════ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function formatChips(totalChips) { return '$' + totalChips.toLocaleString('pt-BR'); }
function chipsToReal(totalChips) { return totalChips * CONFIG.CHIP_VALUES[100] / 100; }
function formatReal(val) { return 'R$ ' + val.toFixed(2).replace('.', ','); }
function formatBRL(chips) { return formatReal(chipsToReal(chips)); }
function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}
function formatDateShort(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

function calcChipBreakdown(chips) {
    const denoms = [5000, 1000, 500, 100];
    const breakdown = {};
    let remaining = chips;
    for (const d of denoms) {
        breakdown[d] = Math.floor(remaining / d);
        remaining %= d;
    }
    return breakdown;
}

function chipBreakdownHTML(chips) {
    const bd = calcChipBreakdown(chips);
    let html = '<span class="chip-display">';
    for (const [d, count] of Object.entries(bd)) {
        if (count > 0) html += `<span class="chip ${CONFIG.CHIP_CLASSES[d]}">${count}×${CONFIG.CHIP_LABELS[d]}</span>`;
    }
    html += '</span>';
    return html;
}

function getPlayerById(id) { return DB.players.find(p => p.id === id); }
function getPlayerName(id) { const p = getPlayerById(id); return p ? p.name : 'Desconhecido'; }
function getInitials(name) { return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(); }

function balanceClass(val) { return val > 0 ? 'balance-positive' : val < 0 ? 'balance-negative' : 'balance-zero'; }

function getAllGames() {
    const all = [
        ...DB.homeGames.map(g => ({ ...g, gameType: 'home' })),
        ...DB.tournaments.map(g => ({ ...g, gameType: 'tournament' }))
    ];
    all.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    return all;
}

function calculatePlayerBalance(playerId) {
    let balance = 0;
    // Transactions (deposits/withdrawals)
    DB.transactions.filter(t => t.playerId === playerId).forEach(t => {
        if (t.type === 'deposit') balance += t.amountChips;
        else if (t.type === 'withdraw') balance -= t.amountChips;
    });
    // Home game results
    DB.homeGames.forEach(g => {
        const pp = (g.players || []).find(p => p.id === playerId);
        if (pp) {
            balance -= (pp.buyInTotal || 0); // spent
            if (pp.cashOut !== undefined && pp.cashOut !== null) {
                balance += pp.cashOut; // gained
            }
        }
    });
    // Tournament results
    DB.tournaments.forEach(t => {
        const pp = (t.players || []).find(p => p.id === playerId);
        if (pp) {
            balance -= (pp.buyInTotal || 0);
            if (pp.prize !== undefined && pp.prize !== null) {
                balance += pp.prize;
            }
        }
    });
    return balance;
}

function calculatePlayerStats(playerId) {
    let gamesPlayed = 0, wins = 0, totalProfit = 0;
    DB.homeGames.forEach(g => {
        const pp = (g.players || []).find(p => p.id === playerId);
        if (pp) {
            gamesPlayed++;
            const profit = (pp.cashOut || 0) - (pp.buyInTotal || 0);
            totalProfit += profit;
            if (profit > 0) wins++;
        }
    });
    DB.tournaments.forEach(t => {
        const pp = (t.players || []).find(p => p.id === playerId);
        if (pp) {
            gamesPlayed++;
            const profit = (pp.prize || 0) - (pp.buyInTotal || 0);
            totalProfit += profit;
            if (pp.position === 1) wins++;
        }
    });
    return { gamesPlayed, wins, totalProfit };
}

function openModal(type, data) {
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    content.innerHTML = getModalContent(type, data);
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    // Focus first input
    setTimeout(() => { const inp = content.querySelector('input,select'); if (inp) inp.focus(); }, 100);
    // Compute totals for modals that show a live sum (e.g. prefilled edit)
    if (type === 'cashOut') updateCashOutTotal();
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
});

   ═══════════════════════════════════════════════════════════════ */
function stepChip(inputId, dir) {
    const inp = document.getElementById(inputId);
    let val = parseInt(inp.value) || 0;
    val = Math.max(0, val + dir);
    inp.value = val;
    if (typeof updateCashOutTotal === 'function') updateCashOutTotal();
}

function updateCashOutTotal() {
    let total = 0;
    [100, 500, 1000, 5000].forEach(d => {
        const v = parseInt(document.getElementById('co-' + d)?.value) || 0;
        total += v * d;
    });
    const el = document.getElementById('cashOutTotal');
    const elR = document.getElementById('cashOutTotalReal');
    if (el) el.textContent = formatChips(total);
    if (elR) elR.textContent = formatBRL(total);
}

function updateTxPreview() {
    const v = parseInt(document.getElementById('inp-txChips')?.value) || 0;
    const el = document.getElementById('txRealPreview');
    if (el) el.textContent = '= ' + formatBRL(v);
}

window.formatRealJS = function(chips) { return formatBRL(parseInt(chips) || 0); };

function createHomeGame() {
    const name = document.getElementById('inp-gameName').value.trim();
    const buyIn = parseInt(document.getElementById('inp-gameBuyIn').value) || 20000;
    const checks = document.querySelectorAll('#gamePlayersCheckboxes input:checked');
    const selectedIds = Array.from(checks).map(c => c.value);
    if (!name) { toast('Informe o nome', 'error'); return; }
    if (selectedIds.length < 2) { toast('Selecione ao menos 2 jogadores', 'error'); return; }
    const game = {
        id: uid(),
        name,
        buyIn,
        status: 'active',
        createdAt: new Date().toISOString(),
        finishedAt: null,
        players: selectedIds.map(pid => ({
            id: pid,
            buyInTotal: buyIn,
            rebuys: 0,
            cashOut: null,
            active: true
        }))
    };
    DB.homeGames.push(game);
    debouncedSave();
    closeModal();
    toast('Home Game iniciado! 🃏');
    openGameDetail(game.id, 'home');

function createTournament() {
    const name = document.getElementById('inp-tourneyName').value.trim();
    const buyIn = parseInt(document.getElementById('inp-tourneyBuyIn').value) || 50000;
    const allowRebuy = document.getElementById('inp-tourneyRebuy').value === 'yes';
    const checks = document.querySelectorAll('#tourneyPlayersCheckboxes input:checked');
    const selectedIds = Array.from(checks).map(c => c.value);
    if (!name) { toast('Informe o nome', 'error'); return; }
    if (selectedIds.length < 2) { toast('Selecione ao menos 2 jogadores', 'error'); return; }
    // Get prize structure
    const prizes = [];
    for (let i = 1; i <= prizeRowCount; i++) {
        const el = document.getElementById('prize-' + i);
        if (el) {
            const pct = parseInt(el.value) || 0;
            if (pct > 0) prizes.push({ position: i, pct });
        }
    }
    const totalPct = prizes.reduce((s, p) => s + p.pct, 0);
    if (totalPct !== 100) { toast(`Prêmios devem somar 100% (atual: ${totalPct}%)`, 'error'); return; }
    const tournament = {
        id: uid(),
        name,
        buyIn,
        allowRebuy,
        prizeStructure: prizes,
        status: 'active',
        createdAt: new Date().toISOString(),
        finishedAt: null,
        players: selectedIds.map(pid => ({
            id: pid,
            buyInTotal: buyIn,
            rebuys: 0,
            eliminated: false,
            position: null,
            prize: 0
        }))
    };
    DB.tournaments.push(tournament);
    prizeRowCount = 3;
    debouncedSave();
    closeModal();
    toast('Torneio iniciado! 🏆');
    openGameDetail(tournament.id, 'tournament');
}

function addPlayersToGame(gameId, gameType) {
    const checks = document.querySelectorAll('#addPlayerGameCheckboxes input:checked');
    const selectedIds = Array.from(checks).map(c => c.value);
    if (selectedIds.length === 0) { toast('Selecione jogadores', 'error'); return; }
    const list = gameType === 'home' ? DB.homeGames : DB.tournaments;
    const game = list.find(g => g.id === gameId);
    selectedIds.forEach(pid => {
        if (gameType === 'home') {
            game.players.push({ id: pid, buyInTotal: game.buyIn, rebuys: 0, cashOut: null, active: true });
        } else {
            game.players.push({ id: pid, buyInTotal: game.buyIn, rebuys: 0, eliminated: false, position: null, prize: 0 });
        }
    });
    debouncedSave();
    closeModal();
    toast(`${selectedIds.length} jogador(es) adicionado(s)`);
    openGameDetail(gameId, gameType);
}

function doRebuy(gameId, playerId, gameType) {
    const amount = parseInt(document.getElementById('inp-rebuyAmount').value) || 0;
    if (amount <= 0) { toast('Valor inválido', 'error'); return; }
    const list = gameType === 'home' ? DB.homeGames : DB.tournaments;
    const game = list.find(g => g.id === gameId);
    const pp = game.players.find(p => p.id === playerId);
    pp.buyInTotal += amount;
    pp.rebuys = (pp.rebuys || 0) + 1;
    debouncedSave();
    closeModal();
    toast(`Rebuy de ${formatChips(amount)} para ${getPlayerName(playerId)}`);
    openGameDetail(gameId, gameType);
}

function doCashOut(gameId, playerId, isEdit) {
    let total = 0;
    [100, 500, 1000, 5000].forEach(d => {
        const v = parseInt(document.getElementById('co-' + d)?.value) || 0;
        total += v * d;
    });
    const game = DB.homeGames.find(g => g.id === gameId);
    const pp = game.players.find(p => p.id === playerId);
    pp.cashOut = total;
    pp.active = false;
    debouncedSave();
    closeModal();
    const profit = total - pp.buyInTotal;
    if (isEdit) {
        toast(`Saída de ${getPlayerName(playerId)} atualizada: ${formatChips(total)} (${profit >= 0 ? '+' : ''}${formatBRL(profit)})`);
    } else {
        toast(`${getPlayerName(playerId)} saiu com ${formatChips(total)} (${profit >= 0 ? '+' : ''}${formatBRL(profit)})`);
    }
    openGameDetail(gameId, 'home');
}

function bringPlayerBack(gameId, playerId) {
    const game = DB.homeGames.find(g => g.id === gameId);
    const pp = game.players.find(p => p.id === playerId);
    if (!pp) return;
    pp.cashOut = null;
    pp.active = true;
    debouncedSave();
    toast(`${getPlayerName(playerId)} voltou ao jogo 🔄`);
    openGameDetail(gameId, 'home');
}

function finishGame(gameId, gameType) {
    if (gameType === 'home') {
        const game = DB.homeGames.find(g => g.id === gameId);
        game.status = 'finished';
        game.finishedAt = new Date().toISOString();
        // Players without cashout get 0
        game.players.forEach(p => {
            if (p.cashOut === null || p.cashOut === undefined) { p.cashOut = 0; p.active = false; }
        });
    } else {
        const game = DB.tournaments.find(g => g.id === gameId);
        game.status = 'finished';
        game.finishedAt = new Date().toISOString();
        // Calculate prizes
        const totalPot = game.players.reduce((s, p) => s + p.buyInTotal, 0);
        game.prizeStructure.forEach(ps => {
            const pp = game.players.find(p => p.position === ps.position);
            if (pp) pp.prize = Math.floor(totalPot * ps.pct / 100);
        });
    }
    debouncedSave();
    closeModal();
    toast('Jogo finalizado! ✅');
    openGameDetail(gameId, gameType);
}

function eliminatePlayer(gameId) {
    const playerId = document.getElementById('inp-eliminatedPlayer').value;
    const t = DB.tournaments.find(g => g.id === gameId);
    const activePlayers = t.players.filter(p => !p.eliminated);
    const position = activePlayers.length; // last alive = highest position number
    const pp = t.players.find(p => p.id === playerId);
    pp.eliminated = true;
    pp.position = position;
    debouncedSave();
    closeModal();
    toast(`${getPlayerName(playerId)} eliminado em ${position}º lugar`);
    // If only 1 player left, they win
    const remaining = t.players.filter(p => !p.eliminated);
    if (remaining.length === 1) {
        remaining[0].eliminated = true;
        remaining[0].position = 1;
        // Calculate prizes
        const totalPot = t.players.reduce((s, p) => s + p.buyInTotal, 0);
        t.prizeStructure.forEach(ps => {
            const pp = t.players.find(p => p.position === ps.position);
            if (pp) pp.prize = Math.floor(totalPot * ps.pct / 100);
        });
        t.status = 'finished';
        t.finishedAt = new Date().toISOString();
        debouncedSave();
        toast('Torneio finalizado! 🏆');
    }
    openGameDetail(gameId, 'tournament');
}

function addTransaction() {
    const playerId = document.getElementById('inp-txPlayer').value;
    const type = document.getElementById('inp-txType').value;
    const chips = parseInt(document.getElementById('inp-txChips').value) || 0;
    const note = document.getElementById('inp-txNote').value.trim();
    if (!playerId) { toast('Selecione um jogador', 'error'); return; }
    if (chips <= 0) { toast('Valor inválido', 'error'); return; }
    DB.transactions.push({
        id: uid(),
        playerId,
        type,
        amountChips: chips,
        note,
        createdAt: new Date().toISOString()
    });
    debouncedSave();
    closeModal();
    toast(`${type === 'deposit' ? 'Depósito' : 'Saque'} de ${formatChips(chips)} registrado`);
    renderCurrentSection();
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════════ */
function renderCurrentSection() {
    switch (currentSection) {
        case 'dashboard': renderDashboard(); break;
        case 'players': renderPlayers(); break;
        case 'games': renderGames(); break;
        case 'ranking': renderRanking(); break;
        case 'finance': renderFinance(); break;
        case 'playerDetail': if (currentDetailPlayerId) renderPlayerDetail(currentDetailPlayerId); break;
        case 'gameDetail': if (currentDetailGame) renderGameDetail(currentDetailGame.id, currentDetailGame.type); break;
    }
}

function renderDashboard() {
    const totalPlayers = DB.players.length;
    const activeGames = [...DB.homeGames, ...DB.tournaments].filter(g => g.status === 'active').length;
    const totalGames = DB.homeGames.length + DB.tournaments.length;
    const totalPot = [...DB.homeGames, ...DB.tournaments]
        .filter(g => g.status === 'active')
        .reduce((s, g) => s + (g.players || []).reduce((ss, p) => ss + (p.buyInTotal || 0), 0), 0);
    document.getElementById('dashStats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${totalPlayers}</div><div class="stat-label">Jogadores</div></div>
        <div class="stat-card"><div class="stat-value">${activeGames}</div><div class="stat-label">Jogos Ativos</div></div>
        <div class="stat-card"><div class="stat-value">${totalGames}</div><div class="stat-label">Total Jogos</div></div>
        <div class="stat-card"><div class="stat-value">${formatBRL(totalPot)}</div><div class="stat-label">Potes Ativos</div></div>
    `;
    // Recent games
    const recent = getAllGames().slice(0, 4);
    if (recent.length === 0) {
        document.getElementById('recentGames').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🃏</div>
                <p>Nenhum jogo ainda. Crie um Home Game ou Torneio para começar!</p>
                <button class="btn btn-primary" onclick="navigate('games')">Ir para Jogos</button>
            </div>
        `;
    } else {
        document.getElementById('recentGames').innerHTML = recent.map(g => renderGameCard(g)).join('');
    }
}

function renderPlayers() {
    const search = (document.getElementById('playerSearch')?.value || '').toLowerCase();
    const filtered = DB.players.filter(p => p.name.toLowerCase().includes(search) || (p.nickname || '').toLowerCase().includes(search));
    if (filtered.length === 0) {
        document.getElementById('playersList').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">👥</div>
                <p>${search ? 'Nenhum jogador encontrado' : 'Nenhum jogador cadastrado'}</p>
                ${!search ? '<button class="btn btn-primary" onclick="openModal(\'addPlayer\')">+ Novo Jogador</button>' : ''}
            </div>
        `;
        return;
    }
    document.getElementById('playersList').innerHTML = filtered.map(p => {
        const balance = calculatePlayerBalance(p.id);
        const stats = calculatePlayerStats(p.id);
        return `
            <div class="player-item" onclick="openPlayerDetail('${p.id}')">
                <div class="player-avatar">${getInitials(p.name)}</div>
                <div class="player-info">
                    <div class="player-name">${p.name}${p.nickname ? ` <span style="color:var(--text-muted);font-weight:400;">(${p.nickname})</span>` : ''}</div>
                    <div class="player-stats-inline">
                        <span>🎮 ${stats.gamesPlayed} jogos</span>
                        <span>🏆 ${stats.wins} vitórias</span>
                    </div>
                </div>
                <div class="player-balance ${balanceClass(balance)}">${formatChips(balance)}<br><span style="font-size:var(--fs-xs);opacity:0.8;">${formatBRL(balance)}</span></div>
            </div>
        `;
    }).join('');
}

function renderGames() {
    const allGames = getAllGames();
    let filtered = allGames;
    if (gameFilter === 'active') filtered = allGames.filter(g => g.status === 'active');
    else if (gameFilter === 'finished') filtered = allGames.filter(g => g.status === 'finished');
    if (filtered.length === 0) {
        document.getElementById('gamesList').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🃏</div>
                <p>${gameFilter !== 'all' ? 'Nenhum jogo nesta categoria' : 'Nenhum jogo ainda'}</p>
            </div>
        `;
        return;
    }
    document.getElementById('gamesList').innerHTML = filtered.map(g => renderGameCard(g)).join('');
}

function renderGameCard(g) {
    const playerCount = (g.players || []).length;
    const totalPot = (g.players || []).reduce((s, p) => s + (p.buyInTotal || 0), 0);
    const typeLabel = g.gameType === 'home' ? 'Home Game' : 'Torneio';
    const typeClass = g.gameType === 'home' ? 'home' : 'tournament';
    const statusLabel = g.status === 'active' ? 'Em Andamento' : 'Finalizado';
    const statusClass = g.status === 'active' ? 'active' : 'finished';
    return `
        <div class="game-card" onclick="openGameDetail('${g.id}','${g.gameType}')" style="cursor:pointer;">
            <div class="game-card-header">
                <span class="game-type-badge ${typeClass}">${g.gameType === 'home' ? '🃏' : '🏆'} ${typeLabel}</span>
                <span class="game-type-badge ${statusClass}">${statusLabel}</span>
            </div>
            <div class="game-card-body">
                <div style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-xs);">${g.name}</div>
                <div style="display:flex;gap:var(--sp-lg);flex-wrap:wrap;font-size:var(--fs-sm);color:var(--text-secondary);">
                    <span>👥 ${playerCount} jogadores</span>
                    <span>💰 ${formatBRL(totalPot)}</span>
                    <span>📅 ${formatDateShort(g.createdAt)}</span>
                </div>
            </div>
        </div>
    `;
}

function setGameFilter(filter, btn) {
    gameFilter = filter;
    document.querySelectorAll('#gamesTabGroup .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGames();
}

/* ═══════════════════════════════════════════════════════════════
   GAME DETAIL
   ═══════════════════════════════════════════════════════════════ */
function openGameDetail(gameId, gameType) {
    currentSection = 'gameDetail';
    currentDetailGame = { id: gameId, type: gameType };
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-gameDetail').classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderGameDetail(gameId, gameType);
}

function renderGameDetail(gameId, gameType) {
    const list = gameType === 'home' ? DB.homeGames : DB.tournaments;
    const game = list.find(g => g.id === gameId);
    if (!game) { navigate('games'); return; }
    document.getElementById('gameDetailTitle').textContent = game.name;
    const totalPot = game.players.reduce((s, p) => s + (p.buyInTotal || 0), 0);
    const isActive = game.status === 'active';
    let html = `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value">${game.players.length}</div><div class="stat-label">Jogadores</div></div>
            <div class="stat-card"><div class="stat-value">${formatBRL(totalPot)}</div><div class="stat-label">Pote Total</div></div>
            <div class="stat-card"><div class="stat-value">${formatChips(totalPot)}</div><div class="stat-label">Fichas Total</div></div>
            <div class="stat-card"><div class="stat-value">${formatChips(game.buyIn)}</div><div class="stat-label">Buy-in</div></div>
        </div>
    `;
    if (isActive) {
        html += `<div style="display:flex;gap:var(--sp-sm);margin-bottom:var(--sp-lg);flex-wrap:wrap;">
            <button class="btn btn-secondary" onclick="openModal('addPlayerToGame',{gameId:'${gameId}',gameType:'${gameType}'})">+ Jogador</button>
            <button class="btn btn-danger" onclick="openModal('finishGame',{gameId:'${gameId}',gameType:'${gameType}'})">Finalizar Jogo</button>
            ${gameType === 'tournament' ? `<button class="btn btn-primary" onclick="openModal('tournamentResult',{gameId:'${gameId}'})">Eliminar Jogador</button>` : ''}
        </div>`;
    }
    // Players list
    html += '<div class="card" style="overflow:auto;"><h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-md);padding:var(--sp-md) var(--sp-md) 0;">Jogadores</h3>';
    const sortedPlayers = [...game.players].sort((a, b) => {
        if (gameType === 'tournament' && a.position && b.position) return a.position - b.position;
        return 0;
    });
    sortedPlayers.forEach(pp => {
        const pName = getPlayerName(pp.id);
        const profit = gameType === 'home'
            ? (pp.cashOut !== null ? pp.cashOut - pp.buyInTotal : null)
            : (pp.prize || 0) - pp.buyInTotal;
        html += `<div class="gp-row">`;
        if (gameType === 'tournament' && pp.position) {
            const rClass = pp.position === 1 ? 'gold' : pp.position === 2 ? 'silver' : pp.position === 3 ? 'bronze' : '';
            html += `<span class="rank-badge ${rClass}">${pp.position}º</span>`;
        }
        html += `<span class="gp-name">${pName}</span>`;
        html += `<span class="gp-chips">Buy-in: ${formatChips(pp.buyInTotal)}`;
        if (pp.rebuys > 0) html += ` <span style="color:var(--accent-warning);">(+${pp.rebuys} rebuy)</span>`;
        html += `</span>`;
        if (gameType === 'home') {
            if (pp.cashOut !== null && pp.cashOut !== undefined) {
                html += `<span class="gp-chips ${balanceClass(profit)}">Saída: ${formatChips(pp.cashOut)} (${profit >= 0 ? '+' : ''}${formatBRL(profit)})</span>`;
                if (isActive) {
                    html += `<span class="gp-actions">
                        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();openModal('cashOut',{gameId:'${gameId}',playerId:'${pp.id}',edit:true})">✏️ Editar Saída</button>
                        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();bringPlayerBack('${gameId}','${pp.id}')">↩️ Voltar ao Jogo</button>
                    </span>`;
                }
            } else if (isActive) {
                html += `<span class="gp-actions">
                    <button class="btn btn-sm btn-success" onclick="event.stopPropagation();openModal('cashOut',{gameId:'${gameId}',playerId:'${pp.id}'})">💰 Saída</button>
                    <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();openModal('rebuy',{gameId:'${gameId}',playerId:'${pp.id}',gameType:'home'})">🔄 Rebuy</button>
                </span>`;
            }
        } else {
            if (pp.eliminated) {
                if (pp.prize > 0) html += `<span class="gp-chips balance-positive">Prêmio: ${formatBRL(pp.prize)}</span>`;
                else html += `<span class="gp-chips" style="color:var(--text-muted);">Eliminado</span>`;
            } else if (isActive) {
                html += `<span class="gp-actions">
                    ${game.allowRebuy ? `<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();openModal('rebuy',{gameId:'${gameId}',playerId:'${pp.id}',gameType:'tournament'})">🔄 Rebuy</button>` : ''}
                </span>`;
            }
        }
        html += `</div>`;
    });
    html += '</div>';
    // Prize structure for tournaments
    if (gameType === 'tournament' && game.prizeStructure) {
        html += `<div class="card" style="margin-top:var(--sp-md);"><h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-md);">Estrutura de Prêmios</h3>`;
        game.prizeStructure.forEach(ps => {
            html += `<div class="prize-bar">
                <span class="prize-position">${ps.position}º</span>
                <div class="prize-fill"><div class="prize-fill-inner" style="width:${ps.pct}%">${ps.pct}%</div></div>
                <span style="font-family:var(--font-mono);font-size:var(--fs-sm);color:var(--text-secondary);min-width:80px;text-align:right;">${formatBRL(totalPot * ps.pct / 100)}</span>
            </div>`;
        });
        html += '</div>';
    }
    document.getElementById('gameDetailContent').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   PLAYER DETAIL
   ═══════════════════════════════════════════════════════════════ */
function openPlayerDetail(playerId) {
    currentSection = 'playerDetail';
    currentDetailPlayerId = playerId;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-playerDetail').classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderPlayerDetail(playerId);
}

function renderPlayerDetail(playerId) {
    const p = getPlayerById(playerId);
    if (!p) { navigate('players'); return; }
    document.getElementById('playerDetailTitle').textContent = p.name;
    const balance = calculatePlayerBalance(playerId);
    const stats = calculatePlayerStats(playerId);
    let html = `
        <div style="display:flex;align-items:center;gap:var(--sp-lg);margin-bottom:var(--sp-lg);flex-wrap:wrap;">
            <div class="player-avatar" style="width:64px;height:64px;font-size:1.8rem;">${getInitials(p.name)}</div>
            <div>
                <div style="font-size:var(--fs-xl);font-weight:700;">${p.name}${p.nickname ? ` <span style="color:var(--text-muted);font-weight:400;">(${p.nickname})</span>` : ''}</div>
                <div style="font-size:var(--fs-sm);color:var(--text-muted);">Desde ${formatDateShort(p.createdAt)}</div>
            </div>
            <div style="margin-left:auto;display:flex;gap:var(--sp-sm);">
                <button class="btn btn-sm btn-secondary" onclick="openModal('editPlayer',{playerId:'${playerId}'})">✏️ Editar</button>
                <button class="btn btn-sm btn-secondary" onclick="openModal('newTransaction',{playerId:'${playerId}'})">💰 Transação</button>
                <button class="btn btn-sm btn-danger" onclick="deletePlayer('${playerId}')">🗑️</button>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value ${balanceClass(balance)}">${formatChips(balance)}</div><div class="stat-label">Saldo Fichas</div></div>
            <div class="stat-card"><div class="stat-value ${balanceClass(balance)}">${formatBRL(balance)}</div><div class="stat-label">Saldo Real</div></div>
            <div class="stat-card"><div class="stat-value">${stats.gamesPlayed}</div><div class="stat-label">Jogos</div></div>
            <div class="stat-card"><div class="stat-value">${stats.wins}</div><div class="stat-label">Vitórias</div></div>
        </div>
    `;
    // Game history
    html += '<div class="card"><h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-md);">Histórico de Jogos</h3>';
    const playerGames = getAllGames().filter(g => (g.players || []).some(pp => pp.id === playerId));
    if (playerGames.length === 0) {
        html += '<p style="color:var(--text-muted);text-align:center;padding:var(--sp-lg);">Nenhum jogo ainda</p>';
    } else {
        playerGames.forEach(g => {
            const pp = g.players.find(p => p.id === playerId);
            const profit = g.gameType === 'home'
                ? (pp.cashOut !== null ? pp.cashOut - pp.buyInTotal : 0)
                : (pp.prize || 0) - pp.buyInTotal;
            html += `<div class="tx-item" style="cursor:pointer;" onclick="openGameDetail('${g.id}','${g.gameType}')">
                <div class="tx-icon game">${g.gameType === 'home' ? '🃏' : '🏆'}</div>
                <div class="tx-info">
                    <div class="tx-desc">${g.name}</div>
                    <div class="tx-date">${formatDate(g.createdAt)} · Buy-in: ${formatChips(pp.buyInTotal)}</div>
                </div>
                <div class="tx-amount ${balanceClass(profit)}">${profit >= 0 ? '+' : ''}${formatBRL(profit)}</div>
            </div>`;
        });
    }
    html += '</div>';
    // Transaction history
    const txs = DB.transactions.filter(t => t.playerId === playerId).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    if (txs.length > 0) {
        html += '<div class="card" style="margin-top:var(--sp-md);"><h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-md);">Transações</h3>';
        txs.forEach(t => {
            const icon = t.type === 'deposit' ? '📥' : '📤';
            const iconClass = t.type === 'deposit' ? 'deposit' : 'withdraw';
            html += `<div class="tx-item">
                <div class="tx-icon ${iconClass}">${icon}</div>
                <div class="tx-info">
                    <div class="tx-desc">${t.type === 'deposit' ? 'Depósito' : 'Saque'}${t.note ? ` — ${t.note}` : ''}</div>
                    <div class="tx-date">${formatDate(t.createdAt)}</div>
                </div>
                <div class="tx-amount ${t.type === 'deposit' ? 'balance-positive' : 'balance-negative'}">${t.type === 'deposit' ? '+' : '-'}${formatBRL(t.amountChips)}</div>
            </div>`;
        });
        html += '</div>';
    }
    document.getElementById('playerDetailContent').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   RANKING
   ═══════════════════════════════════════════════════════════════ */
function setRankingTab(tab, btn) {
    rankingTab = tab;
    btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderRanking();
}

function renderRanking() {
    const rankings = [];
    DB.players.forEach(p => {
        const stats = calculatePlayerStats(p.id);
        let profit = 0;
        if (rankingTab === 'general' || rankingTab === 'homeGames') {
            DB.homeGames.filter(g => g.status === 'finished').forEach(g => {
                const pp = g.players.find(pl => pl.id === p.id);
                if (pp) profit += (pp.cashOut || 0) - pp.buyInTotal;
            });
        }
        if (rankingTab === 'general' || rankingTab === 'tournaments') {
            DB.tournaments.filter(g => g.status === 'finished').forEach(g => {
                const pp = g.players.find(pl => pl.id === p.id);
                if (pp) profit += (pp.prize || 0) - pp.buyInTotal;
            });
        }
        const gamesCount = rankingTab === 'homeGames'
            ? DB.homeGames.filter(g => g.players.some(pl => pl.id === p.id)).length
            : rankingTab === 'tournaments'
                ? DB.tournaments.filter(g => g.players.some(pl => pl.id === p.id)).length
                : stats.gamesPlayed;
        if (gamesCount > 0) {
            rankings.push({ id: p.id, name: p.name, profit, gamesPlayed: gamesCount, wins: stats.wins });
        }
    });
    rankings.sort((a, b) => b.profit - a.profit);
    if (rankings.length === 0) {
        document.getElementById('rankingContent').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🏆</div>
                <p>Sem dados de ranking ainda. Finalize jogos para ver o ranking.</p>
            </div>
        `;
        return;
    }
    let html = `<div style="overflow-x:auto;"><table class="data-table">
        <thead><tr>
            <th style="width:50px;">#</th>
            <th>Jogador</th>
            <th>Jogos</th>
            <th>Vitórias</th>
            <th style="text-align:right;">Lucro (fichas)</th>
            <th style="text-align:right;">Lucro (R$)</th>
        </tr></thead><tbody>`;
    rankings.forEach((r, i) => {
        const pos = i + 1;
        const rClass = pos === 1 ? 'gold' : pos === 2 ? 'silver' : pos === 3 ? 'bronze' : '';
        html += `<tr onclick="openPlayerDetail('${r.id}')" style="cursor:pointer;">
            <td>${rClass ? `<span class="rank-badge ${rClass}">${pos}</span>` : `<span class="rank-cell">${pos}</span>`}</td>
            <td style="font-weight:600;">${r.name}</td>
            <td>${r.gamesPlayed}</td>
            <td>${r.wins}</td>
            <td style="text-align:right;" class="${balanceClass(r.profit)}">${r.profit >= 0 ? '+' : ''}${formatChips(r.profit)}</td>
            <td style="text-align:right;" class="${balanceClass(r.profit)}">${r.profit >= 0 ? '+' : ''}${formatBRL(r.profit)}</td>
        </tr>`;
    });
    html += '</tbody></table></div>';
    document.getElementById('rankingContent').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   FINANCE
   ═══════════════════════════════════════════════════════════════ */
function renderFinance() {
    const totalDeposits = DB.transactions.filter(t => t.type === 'deposit').reduce((s, t) => s + t.amountChips, 0);
    const totalWithdrawals = DB.transactions.filter(t => t.type === 'withdraw').reduce((s, t) => s + t.amountChips, 0);
    const netFlow = totalDeposits - totalWithdrawals;
    document.getElementById('financeStats').innerHTML = `
        <div class="stat-card"><div class="stat-value balance-positive">${formatBRL(totalDeposits)}</div><div class="stat-label">Depósitos</div></div>
        <div class="stat-card"><div class="stat-value balance-negative">${formatBRL(totalWithdrawals)}</div><div class="stat-label">Saques</div></div>
        <div class="stat-card"><div class="stat-value ${balanceClass(netFlow)}">${formatBRL(netFlow)}</div><div class="stat-label">Fluxo Líquido</div></div>
        <div class="stat-card"><div class="stat-value">${DB.transactions.length}</div><div class="stat-label">Transações</div></div>
    `;
    const txs = [...DB.transactions].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    if (txs.length === 0) {
        document.getElementById('transactionsList').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">💰</div>
                <p>Nenhuma transação registrada</p>
            </div>
        `;
        return;
    }
    document.getElementById('transactionsList').innerHTML = txs.map(t => {
        const icon = t.type === 'deposit' ? '📥' : '📤';
        const iconClass = t.type === 'deposit' ? 'deposit' : 'withdraw';
        return `<div class="tx-item">
            <div class="tx-icon ${iconClass}">${icon}</div>
            <div class="tx-info">
                <div class="tx-desc">${getPlayerName(t.playerId)} — ${t.type === 'deposit' ? 'Depósito' : 'Saque'}${t.note ? ` (${t.note})` : ''}</div>
                <div class="tx-date">${formatDate(t.createdAt)}</div>
            </div>
            <div class="tx-amount ${t.type === 'deposit' ? 'balance-positive' : 'balance-negative'}">${t.type === 'deposit' ? '+' : '-'}${formatChips(t.amountChips)}<br><span style="font-size:var(--fs-xs);opacity:0.7;">${t.type === 'deposit' ? '+' : '-'}${formatBRL(t.amountChips)}</span></div>
        </div>`;
    }).join('');
}
